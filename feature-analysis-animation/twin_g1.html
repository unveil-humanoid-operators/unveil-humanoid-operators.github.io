<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Twin G1 — weight leakage</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background: #11141b;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  color: #e8ecf4;
}
#scene-wrap { position:absolute; inset: 0 0 130px 0; }
canvas { display:block; width:100% !important; height:100% !important; }

/* Two overlay chips, top-left & top-right of canvas */
.chip {
  position: absolute;
  top: 14px;
  background: rgba(15,18,25,0.78);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 9px 12px 8px 12px;
  font-size: 12px;
  line-height: 1.35;
  font-variant-numeric: tabular-nums;
  min-width: 158px;
  pointer-events: none;
}
.chip .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.55; margin-bottom: 2px;}
.chip .big   { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px;}
.chip .meta  { font-size: 11px; opacity: 0.72; }
.chip .speed { margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); }
.chip .speed-num { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
.chip .speed-avg { font-size: 10px; opacity: 0.6; margin-left: 4px; }
#chip-heavy { left: 14px; border-left: 3px solid #ff5b6e; }
#chip-light { right: 14px; border-right: 3px solid #5db7ff; text-align: right; }

/* Bottom strip — per-frame root speed */
#strip-wrap {
  position: absolute; left:0; right:0; bottom:0; height:130px;
  background: rgba(8,10,15,0.96);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 8px 14px 8px 14px;
}
#strip-wrap canvas { width:100% !important; height: 100% !important; }
#strip-legend {
  position: absolute; top: 6px; right: 14px;
  font-size: 11px; opacity: 0.75;
}
#strip-legend span { margin-left: 12px; }
#strip-legend .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right: 5px; vertical-align: middle; }

#loading {
  position: absolute; inset: 0; background: #11141b;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; z-index: 20;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #2a3040; border-top-color: #5db7ff;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-status { font-size: 12px; color: #88909d; }
</style>
</head>
<body>

<div id="scene-wrap"></div>

<div id="chip-heavy" class="chip">
  <div class="label">heavier operator</div>
  <div class="big"><span id="chip-h-w">—</span> kg</div>
  <div class="meta" id="chip-h-meta">—</div>
  <div class="speed">
    <div class="label">root speed</div>
    <div><span class="speed-num" id="chip-h-spd">—</span><span class="speed-avg"> m/s · avg <span id="chip-h-avg">—</span></span></div>
  </div>
</div>

<div id="chip-light" class="chip">
  <div class="label">lighter operator</div>
  <div class="big"><span id="chip-l-w">—</span> kg</div>
  <div class="meta" id="chip-l-meta">—</div>
  <div class="speed">
    <div class="label">root speed</div>
    <div><span class="speed-num" id="chip-l-spd">—</span><span class="speed-avg"> m/s · avg <span id="chip-l-avg">—</span></span></div>
  </div>
</div>

<div id="strip-wrap">
  <canvas id="strip"></canvas>
  <div id="strip-legend">
    <span><span class="dot" style="background:#ff5b6e"></span>heavy</span>
    <span><span class="dot" style="background:#5db7ff"></span>light</span>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="load-status">Loading model…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
'use strict';

// ── CSV col → MuJoCo joint name ───────────────────────────────────────────
const CSV_TO_JOINT = {
  left_hip_pitch_joint_dof: 'left_hip_pitch_joint',
  left_hip_roll_joint_dof:  'left_hip_roll_joint',
  left_hip_yaw_joint_dof:   'left_hip_yaw_joint',
  left_knee_joint_dof:      'left_knee_joint',
  left_ankle_pitch_joint_dof:'left_ankle_pitch_joint',
  left_ankle_roll_joint_dof:'left_ankle_roll_joint',
  right_hip_pitch_joint_dof:'right_hip_pitch_joint',
  right_hip_roll_joint_dof: 'right_hip_roll_joint',
  right_hip_yaw_joint_dof:  'right_hip_yaw_joint',
  right_knee_joint_dof:     'right_knee_joint',
  right_ankle_pitch_joint_dof:'right_ankle_pitch_joint',
  right_ankle_roll_joint_dof:'right_ankle_roll_joint',
  waist_yaw_joint_dof:      'waist_yaw_joint',
  waist_roll_joint_dof:     'waist_roll_joint',
  waist_pitch_joint_dof:    'waist_pitch_joint',
  left_shoulder_pitch_joint_dof: 'left_shoulder_pitch_joint',
  left_shoulder_roll_joint_dof:  'left_shoulder_roll_joint',
  left_shoulder_yaw_joint_dof:   'left_shoulder_yaw_joint',
  left_elbow_joint_dof:          'left_elbow_joint',
  left_wrist_roll_joint_dof:     'left_wrist_roll_joint',
  left_wrist_pitch_joint_dof:    'left_wrist_pitch_joint',
  left_wrist_yaw_joint_dof:      'left_wrist_yaw_joint',
  right_shoulder_pitch_joint_dof:'right_shoulder_pitch_joint',
  right_shoulder_roll_joint_dof: 'right_shoulder_roll_joint',
  right_shoulder_yaw_joint_dof:  'right_shoulder_yaw_joint',
  right_elbow_joint_dof:         'right_elbow_joint',
  right_wrist_roll_joint_dof:    'right_wrist_roll_joint',
  right_wrist_pitch_joint_dof:   'right_wrist_pitch_joint',
  right_wrist_yaw_joint_dof:     'right_wrist_yaw_joint',
};

const DEG2RAD = Math.PI / 180;
const G1_MODEL_URL = '../g1_engine/model/g1_model.json';
const G1_MESH_BASE = '../g1_engine/meshes';

// ── Query params: which category to load ─────────────────────────────────
const URL_PARAMS = new URLSearchParams(location.search);
const CATEGORY  = URL_PARAMS.get('category') || 'jumping';
const EMBEDDED  = URL_PARAMS.has('embed');
const MAX_FRAMES = 600;

// ── Global scene + per-robot state ───────────────────────────────────────
let renderer, scene, camera, controls;
let modelData;
let pairs, partials;
const ROBOTS = {
  heavy: { color: 0xff5b6e, xOffset: -1.0, rootGroup: null, bodyGroups: {}, motion: null, frameIdx: 0, accumTime: 0, perFrameSpeed: null, avgSpeed: 0, info: null },
  light: { color: 0x5db7ff, xOffset:  1.0, rootGroup: null, bodyGroups: {}, motion: null, frameIdx: 0, accumTime: 0, perFrameSpeed: null, avgSpeed: 0, info: null },
};
let playing = true;
let lastTime = null;
let masterTime = 0;
let masterDuration = 1;          // seconds — set to max of the two clips

// ── Boot ─────────────────────────────────────────────────────────────────
async function boot() {
  setStatus('Loading metadata…');
  pairs    = await fetchJSON('./data/pairs.json');
  partials = await fetchJSON('./data/partials.json');
  if (!pairs[CATEGORY]) throw new Error(`No pair for category '${CATEGORY}'`);
  ROBOTS.heavy.info = pairs[CATEGORY].heavy;
  ROBOTS.light.info = pairs[CATEGORY].light;

  setStatus('Loading model…');
  modelData = await fetchJSON(G1_MODEL_URL);

  setStatus('Loading motions…');
  ROBOTS.heavy.motion = await loadCSV(pairs[CATEGORY].heavy.csv, MAX_FRAMES);
  ROBOTS.light.motion = await loadCSV(pairs[CATEGORY].light.csv, MAX_FRAMES);
  computeSpeedSeries(ROBOTS.heavy);
  computeSpeedSeries(ROBOTS.light);
  masterDuration = Math.max(ROBOTS.heavy.motion.duration, ROBOTS.light.motion.duration);

  setStatus('Building scene…');
  setupThree();
  setStatus('Loading meshes…');
  await buildRobot(ROBOTS.heavy);
  await buildRobot(ROBOTS.light);

  populateChips();
  document.getElementById('loading').style.display = 'none';
  requestAnimationFrame(loop);
}

// ── Helpers ──────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url); if (!r.ok) throw new Error(`${r.status} ${url}`); return r.json();
}
function setStatus(msg) { const el = document.getElementById('load-status'); if (el) el.textContent = msg; }

// ── CSV → motionData ─────────────────────────────────────────────────────
async function loadCSV(url, maxFrames) {
  const text = await fetch(url).then(r => { if (!r.ok) throw new Error(`CSV: ${url}`); return r.text(); });
  const parsed = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
  const rows = parsed.data;

  let frames = rows;
  const ratio = rows.length / maxFrames;
  if (rows.length > maxFrames) {
    frames = Array.from({ length: maxFrames }, (_, i) => rows[Math.round(i * ratio)]);
  }
  const effectiveFPS = 120 / (rows.length > maxFrames ? ratio : 1);

  const md = {
    numFrames: frames.length,
    frameTime: 1 / effectiveFPS,
    duration:  frames.length / effectiveFPS,
    rootPos:   new Float32Array(frames.length * 3),
    rootQuat:  new Float32Array(frames.length * 4),
    joints:    {},
  };
  Object.values(CSV_TO_JOINT).forEach(name => { md.joints[name] = new Float32Array(frames.length); });

  const tmpEuler = new THREE.Euler(0, 0, 0, 'ZYX');
  const tmpQuat  = new THREE.Quaternion();

  for (let i = 0; i < frames.length; i++) {
    const row = frames[i];
    md.rootPos[i*3]   = (row['root_translateX'] || 0) * 0.01;
    md.rootPos[i*3+1] = (row['root_translateY'] || 0) * 0.01;
    md.rootPos[i*3+2] = (row['root_translateZ'] || 0) * 0.01;
    tmpEuler.set(
      (row['root_rotateX'] || 0) * DEG2RAD,
      (row['root_rotateY'] || 0) * DEG2RAD,
      (row['root_rotateZ'] || 0) * DEG2RAD,
      'ZYX'
    );
    tmpQuat.setFromEuler(tmpEuler);
    md.rootQuat[i*4]   = tmpQuat.w;
    md.rootQuat[i*4+1] = tmpQuat.x;
    md.rootQuat[i*4+2] = tmpQuat.y;
    md.rootQuat[i*4+3] = tmpQuat.z;
    for (const [csvCol, jName] of Object.entries(CSV_TO_JOINT)) {
      if (row[csvCol] !== undefined) md.joints[jName][i] = row[csvCol] * DEG2RAD;
    }
  }
  return md;
}

// Per-frame root-translation speed in m/s. Element 0 is 0 (no previous frame).
function computeSpeedSeries(robot) {
  const m = robot.motion;
  const out = new Float32Array(m.numFrames);
  let sum = 0; let count = 0;
  for (let i = 1; i < m.numFrames; i++) {
    const dx = m.rootPos[i*3]   - m.rootPos[(i-1)*3];
    const dy = m.rootPos[i*3+1] - m.rootPos[(i-1)*3+1];
    const dz = m.rootPos[i*3+2] - m.rootPos[(i-1)*3+2];
    const v = Math.sqrt(dx*dx + dy*dy + dz*dz) / m.frameTime;
    out[i] = v;
    sum += v; count++;
  }
  robot.perFrameSpeed = out;
  robot.avgSpeed = count ? (sum / count) : 0;
}

// ── Three.js setup ───────────────────────────────────────────────────────
function setupThree() {
  const wrap = document.getElementById('scene-wrap');
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  wrap.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color('#11141b');
  scene.fog = new THREE.Fog('#11141b', 10, 26);

  camera = new THREE.PerspectiveCamera(38, wrap.clientWidth / wrap.clientHeight, 0.05, 60);
  camera.position.set(0, 1.55, 6.4);
  camera.lookAt(0, 0.95, 0);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.95, 0);
  controls.enableDamping = true; controls.dampingFactor = 0.06;
  controls.minDistance = 2; controls.maxDistance = 14;
  controls.enableZoom = true;
  controls.update();

  // Lights
  scene.add(new THREE.HemisphereLight(0x8090b0, 0x202028, 1.0));
  const sun = new THREE.DirectionalLight(0xfff8f0, 1.25);
  sun.position.set(4, 8, 4);
  sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 22;
  sun.shadow.camera.left = sun.shadow.camera.bottom = -6;
  sun.shadow.camera.right = sun.shadow.camera.top   =  6;
  scene.add(sun);
  const rim = new THREE.DirectionalLight(0x6688cc, 0.55);
  rim.position.set(-4, 6, -5); scene.add(rim);

  // Floor — dark grid
  const size = 14, divisions = 28;
  const texPx = 1024;
  const cvs = document.createElement('canvas'); cvs.width = cvs.height = texPx;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#1a1f29'; ctx.fillRect(0, 0, texPx, texPx);
  ctx.strokeStyle = '#262c37'; ctx.lineWidth = 4;
  const step = texPx / divisions;
  for (let i = 0; i <= divisions; i++) {
    const p = Math.round(i * step);
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, texPx); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(texPx, p); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(cvs);
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size),
    new THREE.MeshBasicMaterial({ map: tex })
  );
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  scene.add(floor);

  window.addEventListener('resize', () => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    resizeStrip();
  });
}

// ── Robot tree (per robot) ───────────────────────────────────────────────
const geomCache = {};
async function loadSTL(name) {
  if (geomCache[name]) return geomCache[name];
  return new Promise(resolve => {
    new THREE.STLLoader().load(
      `${G1_MESH_BASE}/${name}.STL`,
      geo => { geo.computeVertexNormals(); geomCache[name] = geo; resolve(geo); },
      undefined,
      () => { geomCache[name] = null; resolve(null); }
    );
  });
}

function makeMaterial(rgba, isHeadlike, accentTint) {
  // Phong with slight accent tint so the two robots are subtly distinguishable
  // even when neither's chip is hovered. We keep the material mostly neutral
  // so the visceral point — same robot, different motion — is preserved.
  const isDark = rgba[0] < 0.4;
  const baseDark  = new THREE.Color(0x1a1d24);
  const baseLight = new THREE.Color(0xcdd3df);
  const tint = new THREE.Color(accentTint);
  const base = isDark ? baseDark : baseLight;
  // 8% tint toward accent on light parts; 4% on dark
  const mix = isDark ? 0.06 : 0.10;
  const col = base.clone().lerp(tint, mix);
  return new THREE.MeshStandardMaterial({
    color: col,
    metalness: isDark ? 0.55 : 0.18,
    roughness: isDark ? 0.40 : 0.50,
  });
}

async function buildRobot(robot) {
  // Container: position offset on world X, no rotation
  const container = new THREE.Group();
  container.position.x = robot.xOffset;
  scene.add(container);

  // Z-up → Y-up
  const robotWorld = new THREE.Group();
  robotWorld.rotation.x = -Math.PI / 2;
  container.add(robotWorld);

  const groupMap = {};
  for (const body of modelData.bodies) {
    const outer = new THREE.Group();
    outer.position.set(...body.pos);
    const bq = body.quat;
    outer.quaternion.set(bq[1], bq[2], bq[3], bq[0]);
    const inner = new THREE.Group();
    outer.add(inner);
    groupMap[body.name] = { outer, inner };
    robot.bodyGroups[body.name] = inner;
  }
  for (const body of modelData.bodies) {
    const { outer } = groupMap[body.name];
    if (body.parent && groupMap[body.parent]) {
      groupMap[body.parent].inner.add(outer);
    } else {
      robotWorld.add(outer);
      robot.rootGroup = outer;
    }
  }
  const loadPromises = [];
  for (const body of modelData.bodies) {
    for (const mesh of body.meshes) {
      loadPromises.push(loadSTL(mesh.name).then(geo => {
        if (!geo) return;
        const mat = makeMaterial(mesh.rgba, mesh.name === 'head_link', robot.color);
        const mq = mesh.quat;
        const obj = new THREE.Mesh(geo, mat);
        obj.position.set(...mesh.pos);
        obj.quaternion.set(mq[1], mq[2], mq[3], mq[0]);
        obj.castShadow = true;
        groupMap[body.name].inner.add(obj);
      }));
    }
  }
  await Promise.all(loadPromises);
}

// ── Per-robot frame application ──────────────────────────────────────────
const _tmpAxis = new THREE.Vector3();
const _tmpQ    = new THREE.Quaternion();
function applyFrame(robot, fi) {
  const m = robot.motion;
  if (!m || !robot.rootGroup) return;
  robot.rootGroup.position.set(m.rootPos[fi*3], m.rootPos[fi*3+1], m.rootPos[fi*3+2]);
  robot.rootGroup.quaternion.set(m.rootQuat[fi*4+1], m.rootQuat[fi*4+2], m.rootQuat[fi*4+3], m.rootQuat[fi*4]);
  for (const body of modelData.bodies) {
    if (!body.joint || body.joint.type !== 'hinge') continue;
    const jName = body.joint.name;
    const jArr = m.joints[jName];
    if (!jArr) continue;
    _tmpAxis.set(...body.joint.axis);
    _tmpQ.setFromAxisAngle(_tmpAxis, jArr[fi]);
    robot.bodyGroups[body.name].quaternion.copy(_tmpQ);
  }
}

// ── Chip text ────────────────────────────────────────────────────────────
function populateChips() {
  const h = ROBOTS.heavy.info, l = ROBOTS.light.info;
  document.getElementById('chip-h-w').textContent = h.weight.toFixed(0);
  document.getElementById('chip-l-w').textContent = l.weight.toFixed(0);
  document.getElementById('chip-h-meta').textContent =
    `${h.gender} · ${h.height.toFixed(0)} cm · age ${h.age.toFixed(0)} · A${h.uid.slice(1)}`;
  document.getElementById('chip-l-meta').textContent =
    `${l.gender} · ${l.height.toFixed(0)} cm · age ${l.age.toFixed(0)} · A${l.uid.slice(1)}`;
  document.getElementById('chip-h-avg').textContent = (ROBOTS.heavy.avgSpeed).toFixed(2);
  document.getElementById('chip-l-avg').textContent = (ROBOTS.light.avgSpeed).toFixed(2);
}

// ── Strip plot (per-frame speed over time, both robots overlaid) ─────────
let stripCtx = null;
function ensureStrip() {
  if (stripCtx) return;
  const c = document.getElementById('strip');
  resizeStrip();
  stripCtx = c.getContext('2d');
}
function resizeStrip() {
  const c = document.getElementById('strip');
  const wrap = document.getElementById('strip-wrap');
  const w = wrap.clientWidth - 28; // minus padding
  const h = 114;
  c.width  = Math.round(w * window.devicePixelRatio);
  c.height = Math.round(h * window.devicePixelRatio);
  c.style.width = w + 'px';
  c.style.height = h + 'px';
}

function drawStrip(curT) {
  ensureStrip();
  const c = document.getElementById('strip');
  const ctx = stripCtx;
  if (!ctx) return;
  const dpr = window.devicePixelRatio;
  const W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);

  // Find global y range
  const sH = ROBOTS.heavy.perFrameSpeed;
  const sL = ROBOTS.light.perFrameSpeed;
  let maxV = 0;
  for (const a of [sH, sL]) for (let i = 0; i < a.length; i++) if (a[i] > maxV) maxV = a[i];
  maxV = Math.max(0.1, maxV * 1.05);

  const padL = 36 * dpr, padR = 8 * dpr, padT = 8 * dpr, padB = 18 * dpr;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  // Axis labels
  ctx.fillStyle = 'rgba(232,236,244,0.55)';
  ctx.font = `${10 * dpr}px Segoe UI`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'right';
  ctx.fillText(maxV.toFixed(1), padL - 4 * dpr, padT + 2 * dpr);
  ctx.fillText('0', padL - 4 * dpr, padT + plotH - 2 * dpr);
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('root speed (m/s) over clip time', padL, H - 14 * dpr);

  // Axis line
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1 * dpr;
  ctx.beginPath();
  ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + plotH);
  ctx.lineTo(padL + plotW, padT + plotH); ctx.stroke();

  // Draw a series
  function plot(robot, color) {
    const arr = robot.perFrameSpeed;
    const n = arr.length;
    ctx.strokeStyle = color; ctx.lineWidth = 1.5 * dpr;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const x = padL + (i / (n - 1)) * plotW;
      const y = padT + plotH - (arr[i] / maxV) * plotH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Avg dashed line
    const ay = padT + plotH - (robot.avgSpeed / maxV) * plotH;
    ctx.setLineDash([4 * dpr, 4 * dpr]); ctx.lineWidth = 1 * dpr;
    ctx.beginPath(); ctx.moveTo(padL, ay); ctx.lineTo(padL + plotW, ay); ctx.stroke();
    ctx.setLineDash([]);
  }
  plot(ROBOTS.heavy, '#ff5b6e');
  plot(ROBOTS.light, '#5db7ff');

  // Cursor — master time mapped into each clip's own length (since they may
  // differ). Use heavy clip's duration as reference for the cursor; both
  // restart at 0 when their own clip ends, but the master clock loops on the
  // longer of the two.
  const refDur = masterDuration;
  const frac = (curT / refDur) % 1;
  const cx = padL + frac * plotW;
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1 * dpr;
  ctx.beginPath(); ctx.moveTo(cx, padT); ctx.lineTo(cx, padT + plotH); ctx.stroke();
}

// ── Animation loop ───────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (playing) {
    if (lastTime === null) lastTime = ts;
    const dt = (ts - lastTime) * 0.001;
    lastTime = ts;
    masterTime = (masterTime + dt) % masterDuration;
    // Each robot's own frame index = (masterTime mod its own duration) / frameTime
    for (const robot of Object.values(ROBOTS)) {
      const md = robot.motion;
      const t = masterTime % md.duration;
      robot.frameIdx = Math.min(md.numFrames - 1, Math.floor(t / md.frameTime));
    }
  } else {
    lastTime = null;
  }

  for (const robot of Object.values(ROBOTS)) applyFrame(robot, robot.frameIdx);

  // Live speed readout (current frame's instantaneous speed)
  const hSpd = ROBOTS.heavy.perFrameSpeed[ROBOTS.heavy.frameIdx];
  const lSpd = ROBOTS.light.perFrameSpeed[ROBOTS.light.frameIdx];
  document.getElementById('chip-h-spd').textContent = (hSpd || 0).toFixed(2);
  document.getElementById('chip-l-spd').textContent = (lSpd || 0).toFixed(2);

  drawStrip(masterTime);

  controls.update();
  renderer.render(scene, camera);
}

// ── Parent-frame sync support ───────────────────────────────────────────
window.addEventListener('message', e => {
  const msg = e.data; if (!msg || !msg.type) return;
  if (msg.type === 'SET_CATEGORY' && msg.category) {
    // Cheapest implementation: reload with new query param. Parent decides.
    location.search = `?category=${encodeURIComponent(msg.category)}` + (EMBEDDED ? '&embed=1' : '');
  }
  if (msg.type === 'TOGGLE_PLAY') { playing = !playing; lastTime = null; }
});

// ── Entry ────────────────────────────────────────────────────────────────
boot().catch(err => {
  document.getElementById('loading').innerHTML = `<div style="color:#ff7280;font-size:13px;max-width:380px;text-align:center;">${err.message}</div>`;
  console.error(err);
});
</script>
</body>
