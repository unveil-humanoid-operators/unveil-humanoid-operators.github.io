<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#2c3e6b"/>
  <!-- Unitree G1-style humanoid robot: head + torso + arms + legs.
       Drawn in a 24-unit space, then centered + scaled into the 32 tile. -->
  <g transform="translate(16,16) scale(1.28) translate(-12,-12)">
    <g fill="#ffffff">
      <!-- Head -->
      <rect x="9.25" y="2" width="5.5" height="4.5" rx="1.3"/>
      <!-- Neck -->
      <rect x="11.5" y="6.4" width="1" height="1.3"/>
      <!-- Torso -->
      <rect x="7.5" y="8" width="9" height="7.2" rx="1.2"/>
      <!-- Arms -->
      <rect x="4.6" y="8.6" width="2.4" height="5.6" rx="1"/>
      <rect x="17" y="8.6" width="2.4" height="5.6" rx="1"/>
      <!-- Legs -->
      <rect x="8.5" y="15.6" width="2.6" height="6.4" rx="0.9"/>
      <rect x="12.9" y="15.6" width="2.6" height="6.4" rx="0.9"/>
    </g>
    <!-- Eyes (cut out to the tile's navy) -->
    <circle cx="11" cy="4.2" r="0.6" fill="#2c3e6b"/>
    <circle cx="13" cy="4.2" r="0.6" fill="#2c3e6b"/>
  </g>
</svg>
